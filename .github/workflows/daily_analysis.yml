name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 搬运精美网页到私人网址
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 关键修改：只发布生成的 index.html 文件
          publish_dir: .
          # 这一行确保只搬运 index.html 这种网页文件，不搬源代码
          exclude_assets: '.github,api,apps,bot,data_provider,docker,docs,patch,scripts,sources,src,strategies,templates,tests,.dockerignore,.gitignore,AGENTS.md,LICENSE,README.md,SKILL.md,analyzer_service.py,litellm_config.example.yaml,main.py,pyproject.toml,requirements.txt,server.py,setup.cfg,template.html,test.sh,test_env.py,webui.py'
