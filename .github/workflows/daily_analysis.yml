name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # 每天北京时间16:00自动运行

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 搬运精美网页到私人网址
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports  # 这里的路径需与项目生成报告的文件夹一致
