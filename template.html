<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 股票决策仪表盘</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; border-bottom: 2px solid #ffd700; padding-bottom: 20px; margin-bottom: 30px; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .stock-name { color: #ffd700; font-size: 24px; margin-top: 0; }
        .score-box { float: right; font-size: 48px; color: #39d353; font-weight: bold; }
        .advice { display: inline-block; padding: 5px 15px; border-radius: 5px; background: #238636; color: white; font-weight: bold; }
        .footer { text-align: center; font-size: 12px; color: #8b949e; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 AI 股票分析决策仪表盘</h1>
            <p>数据生成时间：{{ report_date }}</p>
        </div>
        
        {% for stock in stocks %}
        <div class="card">
            <div class="score-box">{{ stock.score }}</div>
            <h2 class="stock-name">{{ stock.symbol }} - {{ stock.name }}</h2>
            <div class="advice">{{ stock.advice }}</div>
            <p><strong>AI 核心逻辑：</strong></p>
            <p>{{ stock.reason }}</p>
        </div>
        {% endfor %}

        <div class="footer">
            <p>声明：本报告由 Gemini AI 自动生成，不构成投资建议。</p>
        </div>
    </div>
</body>
</html>
